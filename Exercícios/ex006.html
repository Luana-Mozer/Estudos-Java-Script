<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        #area {
            font: normal 20pt arial, sans-serif;
            background-color: brown;
            color: white;
            width: 300px;
            height: 200px;
            line-height: 200px;
            text-align: center
        }
    </style>
</head>
<body>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="saiu()">
        interaja...
    </div>
    <script>

        a = document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', saiu)

        function clicar() {
           a.innerHTML = 'Clicou!'
           a.style.backgroundColor = 'green'
           
        }
        function entrar() {
            a = document.getElementById('area')
            a.innerHTML = 'Entrou o mouse!'
        }
        function saiu() {
            a = document.getElementById('area')
            a.innerHTML = 'Saiu o mouse!'
        }
    </script>
</body>
</html>
